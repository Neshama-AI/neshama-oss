## 使用示例代码

```python
from soul.loader import SoulLoader, SoulConfigBuilder
from soul.executor import SoulExecutor

# 方式1: 从文件加载
loader = SoulLoader()
config = loader.load("./soul_examples/basic_soul.yaml")

# 方式2: 使用构建器
builder = SoulConfigBuilder()
config = (builder
    .set_name("My Soul")
    .enable_module("emotions")
    .enable_module("creativity")
    .set_characteristic("humor", 0.7)
    .set_evolution_config(max_snapshot_count=100)
    .build()
)

# 初始化执行器
executor = SoulExecutor()
executor.initialize(config_data=config)
executor.activate()

# 使用
emotions = executor.recognize_emotions("我今天很开心！")
response = executor.generate_emotion_response(emotions, "我今天很开心！")

# 创建快照
snapshot = executor.create_snapshot("milestone", label="First week")

# 获取状态
state = executor.get_full_state()
```
